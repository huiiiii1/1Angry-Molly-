  font-family: Arial, Helvetica, sans-serif;
  text-shadow: 0 0 6px rgba(255,255,255,0.5);

  position: fixed; bottom: 12px; left: 12px; z-index: 9999;
  display: flex; align-items: center; gap: 6px; pointer-events: none;

.pm-dot { width: 5px; height: 5px; border-radius: 50%; }
.pm-copyright {
  color: #999; font-size: 10px;
  font-family: Arial, Helvetica, sans-serif; letter-spacing: 0.5px;

#canvas { display: block; image-rendering: pixelated; touch-action: none; }

  function doPlay() {
    if (playCheerful) {
      soundCheerfulSong();
    } else {
      soundFanfare();
    }
  }

  // Try auto-play immediately
  doPlay();

  // Fallback: if AudioContext still suspended, wait for first gesture

  if (!ctx || ctx.state === 'suspended') {

// ANGRY MOLLY - ENDING / THANKS PAGE
// Macaron Retro Comic Style | Halftone Texture
// ═══════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 1080, H = 1920;
canvas.width = W; canvas.height = H;

function resize() {
  const r = W / H;
  let vw = window.innerWidth, vh = window.innerHeight;
  if (vw / vh > r) { vw = vh * r; } else { vh = vw / r; }
  canvas.style.width = vw + 'px';
  canvas.style.height = vh + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── Color Palette (Macaron Retro Comic) ──
const C = {
  ink: '#1a1a1a',
  white: '#FFFFFF',
  cream: '#FFF8E7',
  pink: '#FFB5C5',
  pinkDark: '#E88A9F',
  mint: '#A8E6CF',
  mintDark: '#7BC4A8',
  yellow: '#FFE066',
  yellowDark: '#ECC840',
  lavender: '#D4BFFF',
  lavenderDark: '#B09AE0',
  peach: '#FFCBA4',
  bgCream: '#FFF0E8',
  coral: '#FF8A80',
  skyBlue: '#A0D8EF',
};

// ── Animation Time ──
let animTime = 0;

// ── Utility Functions ──
function setInkStroke(ctx, width) {
  ctx.strokeStyle = C.ink;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

function drawHalftoneDot(x, y, r) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = C.ink;
  ctx.globalAlpha = 0.08;
  ctx.fill();
  ctx.globalAlpha = 1;
}

// ── Draw Comic Text with outline + inner white stroke ──
function drawComicText(ctx, text, x, y, fontSize, fontColor, outlineWidth, grayscale) {
  ctx.save();
  ctx.font = `900 ${fontSize}px Impact, "Arial Black", Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineJoin = 'round';

  // Outer black stroke
  setInkStroke(ctx, outlineWidth);
  ctx.strokeText(text, x, y);

  // Inner white stroke
  ctx.strokeStyle = C.white;
  ctx.lineWidth = Math.max(1, outlineWidth * 0.35);
  ctx.strokeText(text, x, y);

  // Fill
  var fillCol = grayscale ? '#999999' : fontColor;
  ctx.fillStyle = fillCol;
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawSmallComicText(ctx, text, x, y, fontSize, fontColor, outlineWidth) {
  ctx.save();
  ctx.font = `bold ${fontSize}px "Arial Black", Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = C.ink;
  ctx.lineWidth = outlineWidth;
  ctx.strokeText(text, x, y);
  ctx.fillStyle = fontColor;
  ctx.fillText(text, x, y);
  ctx.restore();
}

// ── Rounded Sticker Button ──
function drawStickerButton(ctx, cx, cy, w, h, bgColor, label, subLabel, time, hasStar) {
  var pulse = Math.sin(time * 3 + cy) * 0.02;
  var bw = w + pulse * 20;
  var bh = h + pulse * 10;

  ctx.save();

  // Shadow offset
  var shadowOff = 8;
  ctx.fillStyle = C.ink;
  ctx.globalAlpha = 0.15;
  roundRect(ctx, cx - bw/2 + shadowOff, cy - bh/2 + shadowOff, bw, bh, 22);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Button fill (macaron pastel)
  ctx.fillStyle = bgColor;
  roundRect(ctx, cx - bw/2, cy - bh/2, bw, bh, 22);
  ctx.fill();

  // White thick comic outline
  setInkStroke(ctx, 5);
  ctx.strokeStyle = C.white;
  roundRect(ctx, cx - bw/2, cy - bh/2, bw, bh, 22);
  ctx.stroke();

  // Outer ink stroke
  setInkStroke(ctx, 4);
  roundRect(ctx, cx - bw/2, cy - bh/2, bw, bh, 22);
  ctx.stroke();

  // Star decoration on left side (for blind box button)
  if (hasStar) {
    drawComicStar(ctx, cx - bw/2 + 50, cy, 18, C.yellow, C.ink, 2.5);
    // Small sparkle
    var spAngle = time * 2;
    var spR = 28;
    ctx.save();
    ctx.translate(cx - bw/2 + 50 + Math.cos(spAngle) * spR, cy + Math.sin(spAngle) * spR * 0.5);
    ctx.rotate(time * 4);
    drawSparkle(ctx, 0, 0, 6, C.yellow);
    ctx.restore();
  }

  // Label text
  var labelSize = Math.min(38, bw * 0.11);
  drawSmallComicText(ctx, label, cx + (hasStar ? 15 : 0), cy - (subLabel ? 12 : 0), labelSize, C.ink, 4);

  // Sub-label
  if (subLabel) {
    ctx.font = `600 ${Math.min(24, bw * 0.07)}px "Microsoft YaHei", "PingFang SC", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#666666';
    ctx.fillText(subLabel, cx + (hasStar ? 15 : 0), cy + labelSize * 0.65);
  }

  ctx.restore();
}

// ── Rounded Rectangle Path ──
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── Comic Star (4-point) ──
function drawComicStar(ctx, cx, cy, size, fillCol, strokeCol, strokeWidth) {
  ctx.save();
  ctx.translate(cx, cy);
  for (var i = 0; i < 4; i++) {
    ctx.rotate(Math.PI / 2);
    ctx.beginPath();
    ctx.moveTo(0, -size);
    ctx.lineTo(size * 0.25, -size * 0.25);
    ctx.lineTo(size, 0);
    ctx.lineTo(size * 0.25, size * 0.25);
    ctx.lineTo(0, size);
    ctx.lineTo(-size * 0.25, size * 0.25);
    ctx.lineTo(-size, 0);
    ctx.lineTo(-size * 0.25, -size * 0.25);
    ctx.closePath();
  }
  ctx.fillStyle = fillCol;
  ctx.fill();
  if (strokeCol) {
    ctx.strokeStyle = strokeCol;
    ctx.lineWidth = strokeWidth;
    ctx.stroke();
  }
  ctx.restore();
}

// ── Sparkle ──
function drawSparkle(ctx, x, y, size, col) {
  ctx.beginPath();
  ctx.moveTo(x, y - size);
  ctx.lineTo(x + size * 0.3, y - size * 0.3);
  ctx.lineTo(x + size, y);
  ctx.lineTo(x + size * 0.3, y + size * 0.3);
  ctx.lineTo(x, y + size);
  ctx.lineTo(x - size * 0.3, y + size * 0.3);
  ctx.lineTo(x - size, y);
  ctx.lineTo(x - size * 0.3, y - size * 0.3);
  ctx.closePath();
  ctx.fillStyle = col;
  ctx.fill();
}

  // Grooves (concentric circles)
  ctx.globalAlpha = 0.15;
  for (var gr = r * 0.3; gr < r * 0.9; gr += r * 0.12) {
    ctx.beginPath();
    ctx.arc(0, 0, gr, 0, Math.PI * 2);
    ctx.strokeStyle = '#444444';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Center label
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.28, 0, Math.PI * 2);
  ctx.fillStyle = C.pink;
  ctx.fill();
  setInkStroke(ctx, 2);
  ctx.stroke();

  // Center hole
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.05, 0, Math.PI * 2);
  ctx.fillStyle = C.ink;
  ctx.fill();

  ctx.restore();
}

function drawPaintBucket(ctx, x, y, scale, col) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  // Bucket body
  ctx.beginPath();
  ctx.moveTo(-30, 10);
  ctx.lineTo(-25, 45);
  ctx.lineTo(25, 45);
  ctx.lineTo(30, 10);
  ctx.closePath();
  ctx.fillStyle = col || C.coral;
  ctx.fill();
  setInkStroke(ctx, 3);
  ctx.stroke();

  // Handle
  ctx.beginPath();
  ctx.moveTo(-30, 10);
  ctx.quadraticCurveTo(-40, -15, -15, -20);
  ctx.strokeStyle = C.ink;
  ctx.lineWidth = 3;
  ctx.stroke();

  // Paint drip
  ctx.beginPath();
  ctx.moveTo(5, 45);
  ctx.lineTo(8, 55);
  ctx.lineTo(11, 45);
  ctx.fillStyle = col || C.coral;
  ctx.fill();
  ctx.stroke();

  ctx.restore();
}

function drawFrameCorner(ctx, x, y, size, rot, col) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);

  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(size, 0);
  ctx.lineTo(size, size * 0.15);
  ctx.lineTo(size * 0.15, size * 0.15);
  ctx.lineTo(size * 0.15, size);
  ctx.lineTo(0, size);
  ctx.closePath();
  ctx.fillStyle = col || C.yellow;
  ctx.globalAlpha = 0.6;
  ctx.fill();
  ctx.globalAlpha = 1;
  setInkStroke(ctx, 3);
  ctx.stroke();

  ctx.restore();
}

// ── Halftone Background Pattern ──
function drawBackground(ctx) {
  // Base: same bright red as loading page
  ctx.fillStyle = '#E82020';
  ctx.fillRect(0, 0, W, H);

  // Subtle halftone dot pattern overlay
  ctx.save();
  ctx.globalAlpha = 0.04;
  var dotSpacing = 16;
  for (var dy = 0; dy < H + dotSpacing; dy += dotSpacing) {
    for (var dx = 0; dx < W + dotSpacing; dx += dotSpacing) {
      var distFromCenter = Math.sqrt(Math.pow(dx - W/2, 2) + Math.pow(dy - H/2, 2));
      var maxDist = Math.sqrt(W*W + H*H) / 2;
      var dotR = 1.5 + (distFromCenter / maxDist) * 2;
      ctx.beginPath();
      ctx.arc(dx, dy, dotR, 0, Math.PI * 2);
      ctx.fillStyle = C.ink;
      ctx.fill();
    }
  }
  ctx.restore();

  // Corner halftone clusters
  ctx.save();
  ctx.globalAlpha = 0.03;
  for (var c = 0; c < 200; c++) {
    var edgeX = Math.random() < 0.5 ? Math.random() * 120 : W - Math.random() * 120;
    var edgeY = Math.random() < 0.5 ? Math.random() * 120 : H - Math.random() * 120;
    drawHalftoneDot(edgeX, edgeY, 2 + Math.random() * 4);
  }
  ctx.restore();
}

// ── Top Banner: "感谢游玩！" ──
function drawTopBanner(ctx, time) {
  var bannerY = 100;
  var bannerW = 720;
  var bannerH = 110;
  var bannerX = W / 2;

  // Banner ribbon shape
  ctx.save();
  ctx.translate(bannerX, bannerY);

  // Ribbon tail left
  ctx.beginPath();
  ctx.moveTo(-bannerW/2 - 40, -bannerH/2 + 15);
  ctx.lineTo(-bannerW/2, -bannerH/2);
  ctx.lineTo(-bannerW/2, bannerH/2);
  ctx.lineTo(-bannerW/2 - 40, bannerH/2 - 15);
  ctx.closePath();
  ctx.fillStyle = C.pinkDark;
  ctx.fill();
  setInkStroke(ctx, 4);
  ctx.stroke();

  // Ribbon tail right
  ctx.beginPath();
  ctx.moveTo(bannerW/2 + 40, -bannerH/2 + 15);
  ctx.lineTo(bannerW/2, -bannerH/2);
  ctx.lineTo(bannerW/2, bannerH/2);
  ctx.lineTo(bannerW/2 + 40, bannerH/2 - 15);
  ctx.closePath();
  ctx.fillStyle = C.pinkDark;
  ctx.fill();
  ctx.stroke();

  // Main banner body
  roundRect(ctx, -bannerW/2, -bannerH/2, bannerW, bannerH, 18);
  ctx.fillStyle = C.pink;
  ctx.fill();
  ctx.strokeStyle = C.white;
  ctx.lineWidth = 5;
  ctx.stroke();
  setInkStroke(ctx, 4);
  roundRect(ctx, -bannerW/2, -bannerH/2, bannerW, bannerH, 18);
  ctx.stroke();

  // Banner text
  drawComicText(ctx, '\u611f\u8c22\u6e38\u73a9\uff01', 0, 0, 68, C.white, 10);

  // Decorative hearts on banner sides
  var heartPulse = 0.9 + Math.sin(time * 3) * 0.1;
  drawHeart(ctx, -bannerW/2 + 50, 0, 18 * heartPulse, C.yellow);
  drawHeart(ctx, bannerW/2 - 50, 0, 18 * heartPulse, C.yellow);

  ctx.restore();

  // Share hint (top right)
  ctx.save();
  var shareAlpha = 0.6 + Math.sin(time * 2) * 0.25;
  ctx.globalAlpha = shareAlpha;
  drawSmallComicText(ctx, '\u70b9\u51fb\u5206\u4eab\u7ed9\u597d\u53cb\u5427', W - 90, 70, 26, C.pinkDark, 3);
  ctx.restore();

  // Small hand icon pointing to share text
  ctx.save();
  ctx.translate(W - 160, 75);
  ctx.rotate(Math.sin(time * 1.5) * 0.15);
  ctx.font = '24px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = C.ink;
  ctx.fillText('\u270B', 0, 0);
  ctx.restore();
}

function drawHeart(ctx, x, y, size, col) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(size / 20, size / 20);
  ctx.beginPath();
  ctx.moveTo(0, 5);
  ctx.bezierCurveTo(-10, -5, -18, 3, 0, 18);
  ctx.bezierCurveTo(18, 3, 10, -5, 0, 5);
  ctx.fillStyle = col;
  ctx.fill();
  setInkStroke(ctx, 1.5);
  ctx.stroke();
  ctx.restore();
}

// ── Molly Vinyl Group Image (original image, full width) ──
var mollyGroupImg = new Image();
mollyGroupImg.src = 'molly_vinyl_group.jpg';

function drawMollyGroupImage(ctx, time) {
  if (!mollyGroupImg.complete || !mollyGroupImg.naturalWidth) return;

  // Fill width of page, scale height proportionally
  var imgW = mollyGroupImg.naturalWidth;
  var imgH = mollyGroupImg.naturalHeight;
  var scale = W / imgW; // full width
  var drawW = W;
  var drawH = imgH * scale;

  var cx = W / 2;
  var cy = H * 0.45; // center vertically (shifted up)

  ctx.save();
  // Draw original image directly (no white removal, no multiply)
  ctx.drawImage(mollyGroupImg, cx - drawW / 2, cy - drawH / 2, drawW, drawH);
  ctx.restore();
}

// ── Buttons Layout & Hit Detection ──
const BUTTONS = [
  {
    label: '\u524d\u5f80\u5c0f\u7a0b\u5e8f\u62bd\u76f2\u76d2',   // 前往小程序抽盲盒
    subLabel: '',
    color: C.mint,
    action: function() { window.location.href = 'https://www.popmart.com.cn/home'; },
    hasStar: true,
    cyRatio: 0.76,
  },
  {
    label: '\u518d\u73a9\u4e00\u6b21',                              // 再玩一次
    subLabel: '',
    color: C.yellow,
    action: function() { soundRestart(); setTimeout(function() { window.location.href = 'index.html'; }, 250); },
    hasStar: false,
    cyRatio: 0.86,
  },
];
const BTN_W = 520;
const BTN_H = 105;

function getButtonBounds(idx) {
  return {
    x: W / 2,
    y: H * BUTTONS[idx].cyRatio,
    w: BTN_W,
    h: BTN_H,
  };
}

function checkHitButton(px, py) {
  for (var i = 0; i < BUTTONS.length; i++) {
    var b = getButtonBounds(i);
    if (px > b.x - b.w/2 && px < b.x + b.w/2 && py > b.y - b.h/2 && py < b.y + b.h/2) {
      return i;
    }
  }
  return -1;
}

// ── Draw All Buttons ──
function drawButtons(ctx, time) {
  for (var i = 0; i < BUTTONS.length; i++) {
    var b = getButtonBounds(i);
    var btn = BUTTONS[i];
    drawStickerButton(ctx, b.x, b.y, b.w, b.h, btn.color, btn.label, btn.subLabel, time, btn.hasStar);
  }
}

// ── Page Decorations ──
function drawPageDecors(ctx, time) {
  // Vinyl record decoration (bottom left)
  drawDecorVinyl(ctx, 130, H - 220, 85, time * 0.3);

  // Paint bucket (bottom right)
  drawPaintBucket(ctx, W - 120, H - 280, 0.8, C.pink);

  // Frame corners
  drawFrameCorner(ctx, 60, 180, 50, 0, C.mint);
  drawFrameCorner(ctx, W - 60, 180, 50, Math.PI / 2, C.lavender);
  drawFrameCorner(ctx, 60, H - 450, 45, -Math.PI / 2, C.yellow);
  drawFrameCorner(ctx, W - 60, H - 400, 55, Math.PI, C.peach);

  // Scattered small dots / confetti
  ctx.save();
  ctx.globalAlpha = 0.12;
  for (var d = 0; d < 30; d++) {
    var dx = 80 + Math.sin(d * 137.5) * (W - 160) / 2 + W / 4;
    var dy = 300 + Math.cos(d * 97.3) * 500 + H * 0.2;
    var dr = 3 + (d % 3) * 2;
    ctx.beginPath();
    ctx.arc(dx, dy, dr, 0, Math.PI * 2);
    var dc = [C.pink, C.mint, C.yellow, C.lavender][d % 4];
    ctx.fillStyle = dc;
    ctx.fill();
  }
  ctx.restore();

  // Mini vinyls floating near top
  drawDecorVinyl(ctx, 150, 280, 35, -time * 0.5);
  drawDecorVinyl(ctx, W - 140, 320, 28, time * 0.7);

  // Small stars scattered
  for (var st = 0; st < 8; st++) {
    var stx = 100 + (st * 137) % (W - 200);
    var sty = 200 + (st * 89) % (H * 0.4);
    var sts = 6 + (st % 3) * 4;
    var stRot = time * (1.5 + st * 0.3);
    ctx.save();
    ctx.translate(stx, sty);
    ctx.rotate(stRot);
    drawSparkle(ctx, 0, 0, sts, [C.yellow, C.lavender, C.pink, C.mint][st % 4]);
    ctx.restore();
  }
}

// ── Click Handler ──
canvas.addEventListener('click', function(e) {
  var p = getPointerPos(e);
  var hitIdx = checkHitButton(p.x, p.y);
  if (hitIdx >= 0) {
    BUTTONS[hitIdx].action();
  }
});

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var t = e.touches[0];
  var r = canvas.getBoundingClientRect();
  var px = (t.clientX - r.left) / r.width * W;
  var py = (t.clientY - r.top) / r.height * H;
  var hitIdx = checkHitButton(px, py);
  if (hitIdx >= 0) {
    BUTTONS[hitIdx].action();
  }
}, { passive: false });

function getPointerPos(e) {
  var r = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - r.left) / r.width * W,
    y: (e.clientY - r.top) / r.height * H,
  };
}

// ── Hover Cursor ──
canvas.addEventListener('mousemove', function(e) {
  var p = getPointerPos(e);
  var hit = checkHitButton(p.x, p.y) >= 0;
  canvas.style.cursor = hit ? 'pointer' : 'default';
});

// ═══════════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════════
function render() {
  animTime += 1 / 24; // 24fps

  // Background (red)
  drawBackground(ctx);

  // Molly vinyl group image (above background, below everything else)
  drawMollyGroupImage(ctx, animTime);

  // Top banner (above image)
  drawTopBanner(ctx, animTime);

  // Buttons (above all)
  drawButtons(ctx, animTime);

  requestAnimationFrame(render);
}

// Start
requestAnimationFrame(render);
</script>
